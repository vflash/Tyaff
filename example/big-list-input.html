<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big List Input — tyaff vs React</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
h1 { font-size: 1.5em; margin-bottom: 16px; color: #58a6ff; }
.tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.tab { padding: 8px 24px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: inherit; }
.tab:hover { background: #30363d; border-color: #58a6ff; }
.tab.active { background: #238636; border-color: #2ea043; color: #fff; font-weight: bold; }
.controls { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
.btn { padding: 6px 16px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: inherit; }
.btn:hover { background: #30363d; border-color: #58a6ff; }
.btn.active { background: #1f6feb; border-color: #388bfd; color: #fff; }
.info { color: #7a838b; font-size: 13px; margin-left: 12px; }
.list-container { border: 1px solid #30363d; border-radius: 8px; overflow: hidden; max-height: 70vh; overflow-y: auto; }
.list-header { position: sticky; top: 0; background: #161b22; padding: 8px 12px; border-bottom: 1px solid #30363d; display: flex; gap: 12px; font-size: 13px; color: #7a838b; z-index: 10; }
.list-header span { min-width: 60px; }
.list-header span:last-child { flex: 1; }
.row { display: flex; gap: 12px; padding: 4px 12px; border-bottom: 1px solid #21262d; align-items: center; }
.row:hover { background: #161b22; }
.row-num { min-width: 60px; color: #7a838b; font-size: 12px; }
.row input { width: 200px; padding: 4px 8px; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; border-radius: 4px; font-family: inherit; font-size: 13px; }
.row input:focus { border-color: #58a6ff; outline: none; }
.row-text { flex: 1; color: #c9d1d9; font-size: 13px; }
.timer { color: #7a838b; font-size: 13px; }
</style>
</head>
<body>

<h1>📝 Big List Input — tyaff vs React</h1>

<div class="tabs">
    <button class="tab active" id="tabTyaff">tyaff</button>
    <button class="tab" id="tabReact">React</button>
</div>

<div class="controls">
    <button class="btn" data-count="0">0</button>
    <button class="btn" data-count="1000">1k</button>
    <button class="btn" data-count="5000">5k</button>
    <button class="btn" data-count="10000">10k</button>
    <button class="btn" data-count="15000">15k</button>
    <button class="btn" data-count="20000">20k</button>
    <button class="btn" data-count="30000">30k</button>
    <button class="btn" data-count="50000">50k</button>
    <span class="info" id="info">Готово</span>
    <span class="timer" id="timer"></span>
</div>

<div id="app"></div>

<script type="module">
import { h, Component, mount, refresh } from '../src/core.js';
import React, { useState as RuseState, memo as Rmemo, useCallback as RuseCallback } from 'https://esm.sh/react@19.2.7';
import { createRoot as RcreateRoot } from 'https://esm.sh/react-dom@19.2.7/client';
import { flushSync as RflushSync } from 'https://esm.sh/react-dom@19.2.7';

const rh = React.createElement;
const appEl = document.getElementById('app');
const infoEl = document.getElementById('info');
const timerEl = document.getElementById('timer');

let currentLib = 'tyaff';
let currentCount = 0;
let items = [];

function generateItems(count) {
    items = Array.from({ length: count }, (_, i) => ({ id: i, text: 'item ' + i }));
}

function measureTime(fn, label) {
    const t0 = performance.now();
    fn();
    const t1 = performance.now();
    timerEl.textContent = `${label}: ${(t1 - t0).toFixed(1)}ms`;
}

// ============================================================================
// TYAFF IMPLEMENTATION
// ============================================================================

// Row: получает {items, index} — props() трансформирует в {id, text}
// memo() по text — если text не изменился, render не вызывается
const TyaffRow = Component({
    name: 'Row',
    props: ({items, index, onInput}) => ({
        id: items[index]?.id,
        text: items[index]?.text,
        onInput
    }),
    memo(props) { return [props.text]; },
    render(props) {
        return h('div', { className: 'row' },
            h('span', { className: 'row-num' }, '#' + props.id),
            h('input', {
                value: props.text,
                onInput: (e) => props.onInput(props.id, e.target.value)
            }),
            h('span', { className: 'row-text' }, props.text)
        );
    }
});

// App: memo(() => []) — родитель не вызывает render при update()
// Только передаёт items/index детям, дети сами решают через memo
const TyaffApp = Component({
    name: 'App',
    init() {
        this.items = items;
        this.count = 0;
    },
    onInput(id, value) {
        items[id].text = value;
        const t0 = performance.now();
        this.update().then(() => {
            const t1 = performance.now();
            timerEl.textContent = `tyaff input: ${(t1 - t0).toFixed(2)}ms`;
        });
    },
    memo() { return [this.count]; }, // родитель не перерисовывается
    render() {
        const out = [];
        for (let i = 0; i < this.count; i++) {
            out.push(h(TyaffRow, {
                key: items[i].id,
                items: this.items,
                index: i,
                onInput: this.onInput
            }));
        }
        return h('div', null,
            h('div', { className: 'list-container' },
                h('div', { className: 'list-header' },
                    h('span', null, 'ID'),
                    h('span', null, 'Input'),
                    h('span', null, 'Text')
                ),
                out
            )
        );
    }
});

let tyaffInst = null;
function renderTyaff() {
    if (!tyaffInst) {
        const v = mount(h(TyaffApp), appEl);
        tyaffInst = v._instance;
    }
    tyaffInst.items = items;
    tyaffInst.count = currentCount;
    const t0 = performance.now();
    tyaffInst.update().then(() => {
        const t1 = performance.now();
        timerEl.textContent = `tyaff render: ${(t1 - t0).toFixed(1)}ms`;
    });
}

// ============================================================================
// REACT IMPLEMENTATION
// ============================================================================

const ReactRow = Rmemo(function ReactRow({ id, text, onInput }) {
    return rh('div', { className: 'row' },
        rh('span', { className: 'row-num' }, '#' + id),
        rh('input', {
            value: text,
            onChange: (e) => onInput(id, e.target.value)
        }),
        rh('span', { className: 'row-text' }, text)
    );
});

function ReactApp({ count }) {
    const [, forceUpdate] = RuseState(0);

    const onInput = RuseCallback((id, value) => {
        items[id].text = value;
        const t0 = performance.now();
        RflushSync(() => forceUpdate(n => n + 1));
        const t1 = performance.now();
        timerEl.textContent = `React input: ${(t1 - t0).toFixed(2)}ms`;
    }, []);

    const out = [];
    for (let i = 0; i < count; i++) {
        out.push(rh(ReactRow, {
            key: items[i].id,
            id: items[i].id,
            text: items[i].text,
            onInput
        }));
    }

    return rh('div', null,
        rh('div', { className: 'list-container' },
            rh('div', { className: 'list-header' },
                rh('span', null, 'ID'),
                rh('span', null, 'Input'),
                rh('span', null, 'Text')
            ),
            out
        )
    );
}

let reactRoot = null;
function renderReact() {
    if (!reactRoot) {
        reactRoot = RcreateRoot(appEl);
    }
    measureTime(() => {
        RflushSync(() => {
            reactRoot.render(rh(ReactApp, { count: currentCount }));
        });
    }, 'React render');
}

// ============================================================================
// CONTROLS
// ============================================================================

function render() {
    // Правильный unmount перед очисткой
    if (tyaffInst) { try { mount(null, appEl); } catch(e) {} }
    if (reactRoot) { try { reactRoot.unmount(); } catch(e) {} }
    appEl.innerHTML = '';
    tyaffInst = null;
    reactRoot = null;

    if (currentCount === 0) {
        infoEl.textContent = 'Пусто';
        timerEl.textContent = '';
        return;
    }

    generateItems(currentCount);
    infoEl.textContent = `${currentCount} строк`;

    if (currentLib === 'tyaff') {
        renderTyaff();
    } else {
        renderReact();
    }
}

// Tab switching
document.getElementById('tabTyaff').addEventListener('click', () => {
    currentLib = 'tyaff';
    document.getElementById('tabTyaff').classList.add('active');
    document.getElementById('tabReact').classList.remove('active');
    // Сброс на 0 для быстрого переключения
    currentCount = 0;
    document.querySelectorAll('.btn[data-count]').forEach(b => b.classList.remove('active'));
    document.querySelector('.btn[data-count="0"]').classList.add('active');
    render();
});

document.getElementById('tabReact').addEventListener('click', () => {
    currentLib = 'react';
    document.getElementById('tabReact').classList.add('active');
    document.getElementById('tabTyaff').classList.remove('active');
    // Сброс на 0 для быстрого переключения
    currentCount = 0;
    document.querySelectorAll('.btn[data-count]').forEach(b => b.classList.remove('active'));
    document.querySelector('.btn[data-count="0"]').classList.add('active');
    render();
});

// Count buttons
document.querySelectorAll('.btn[data-count]').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.btn[data-count]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCount = parseInt(btn.dataset.count);
        render();
    });
});

// Default
document.querySelector('.btn[data-count="0"]').classList.add('active');
</script>

</body>
</html>
